<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Global Eagle Consulting</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="app-header"></div>

  <section class="page-header" style="background-color: #013686; padding-top: 180px; padding-bottom: 120px; border-bottom: none;">
    <div class="animate-on-scroll">
      <h1 style="color: #ffffff; font-size: 3.5rem; margin-bottom: 15px;">Contact <span style="color: #c91216;">Us</span></h1>
      <p style="color: rgba(255, 255, 255, 0.85); font-size: 1.3rem; max-width: 700px; margin: 0 auto; font-weight: 300;">Get in touch with our team today.</p>
    </div>
  </section>

  <section class="section">
    <div class="contact-container animate-on-scroll">
      
      <div class="contact-info">
        <h2 style="margin-bottom: 30px; font-size: 2rem;">Company Details</h2>
        
        <div class="contact-info-item">
          <i class="fas fa-map-marker-alt"></i>
          <div>
            <h4 style="margin-bottom: 5px;">Our Location</h4>
            <p style="color: var(--text-muted);">123 Eagle Way, Business District<br>New York, NY 10001</p>
          </div>
        </div>
        
        <div class="contact-info-item">
          <i class="fas fa-phone"></i>
          <div>
            <h4 style="margin-bottom: 5px;">Phone Number</h4>
            <p style="color: var(--text-muted);">+1 (555) 123-4567<br>Mon-Fri, 9am - 5pm</p>
          </div>
        </div>
        
        <div class="contact-info-item">
          <i class="fas fa-envelope"></i>
          <div>
            <h4 style="margin-bottom: 5px;">Email Address</h4>
            <p style="color: var(--text-muted);">info@globaleagleconsulting.com</p>
          </div>
        </div>
      </div>

      <div class="contact-form-wrapper">
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
          <h3 style="margin-bottom: 20px;">Send Us a Message</h3>
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" class="form-control" placeholder="Your Email" required>
          </div>
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Subject" required>
          </div>
          <div class="form-group">
            <textarea class="form-control" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="btn btn-solid" style="width: 100%;">Send Message</button>
        </form>
      </div>
      
    </div>

    <div class="map-container animate-on-scroll">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.25280018596!2d-74.11976246479007!3d40.69766374853032!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2s!4v1690000000000!5m2!1sen!2s" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </section>

  <div id="app-footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
