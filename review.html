<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review - Global Eagle Consulting</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="app-header"></div>

  <section class="page-header" style="background-color: #013686; padding-top: 180px; padding-bottom: 120px; border-bottom: none;">
    <div class="animate-on-scroll">
      <h1 style="color: #ffffff; font-size: 3.5rem; margin-bottom: 15px;">Customer <span style="color: #c91216;">Review & Feedback</span></h1>
      <p style="color: rgba(255, 255, 255, 0.85); font-size: 1.3rem; max-width: 700px; margin: 0 auto; font-weight: 300;">We value your opinion. Let us know how we did!</p>
    </div>
  </section>

  <section class="section">
    <div class="contact-container animate-on-scroll" style="display: block; max-width: 800px; margin: 0 auto;">
      
      <div class="contact-form-wrapper">
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Review submitted successfully!');">
          <h3 style="margin-bottom: 20px; text-align: center;">Leave a Review</h3>
          <div class="form-group" style="text-align: center; margin-bottom: 30px;">
            <i class="far fa-star" style="font-size: 2rem; color: var(--gold); cursor: pointer;"></i>
            <i class="far fa-star" style="font-size: 2rem; color: var(--gold); cursor: pointer;"></i>
            <i class="far fa-star" style="font-size: 2rem; color: var(--gold); cursor: pointer;"></i>
            <i class="far fa-star" style="font-size: 2rem; color: var(--gold); cursor: pointer;"></i>
            <i class="far fa-star" style="font-size: 2rem; color: var(--gold); cursor: pointer;"></i>
          </div>
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" class="form-control" placeholder="Your Email" required>
          </div>
          <div class="form-group">
            <textarea class="form-control" placeholder="Write your review here..." required></textarea>
          </div>
          <button type="submit" class="btn btn-solid" style="width: 100%;">Submit Feedback</button>
        </form>
      </div>
      
    </div>
  </section>

  <div id="app-footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
