<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store - Global Eagle Consulting</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="app-header"></div>

  <section class="page-header">
    <div class="animate-on-scroll">
      <h1>Our Store</h1>
      <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Exclusive products and premium apparel.</p>
    </div>
  </section>

  <section class="section">
    <div class="products-grid animate-on-scroll">
      
      <!-- Product 1 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 1" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Premium T-Shirt</h3>
          <p class="product-price">$29.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 2" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Classic Hoodie</h3>
          <p class="product-price">$54.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 3" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Cap</h3>
          <p class="product-price">$19.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 4" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Polo Shirt</h3>
          <p class="product-price">$39.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 5 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 5" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Jacket</h3>
          <p class="product-price">$89.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 6 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1542280756-74b2f55e73e1?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 6" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Gym Bag</h3>
          <p class="product-price">$45.00</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 7 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1514989940723-e8e51635b782?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 7" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle Beanie</h3>
          <p class="product-price">$15.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

      <!-- Product 8 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=600" alt="Product Mockup 8" class="product-img">
        <div class="product-info">
          <h3 class="product-title">Eagle V-Neck T-Shirt</h3>
          <p class="product-price">$27.99</p>
          <button class="btn btn-primary" style="margin-top: 15px; width: 100%;">Add to Cart</button>
        </div>
      </div>

    </div>
  </section>

  <div id="app-footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
